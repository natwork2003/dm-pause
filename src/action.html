<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #1a1a2e;
      color: white;
      gap: 16px;
      padding: 16px;
    }
    #status { font-size: 1rem; text-align: center; }
    #pauseBtn {
      padding: 12px 32px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      display: none;
    }
    .paused { background: #e74c3c; color: white; }
    .running { background: #2ecc71; color: white; }
  </style>
</head>
<body>
  <div id="status">Connecting...</div>
  <button id="pauseBtn"></button>

  <script type="module">
    import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@3.1.0/+esm";

    const METADATA_KEY = "com.natwork.dmpause/paused";
    const statusEl = document.getElementById("status");
    const btn = document.getElementById("pauseBtn");

    function updateUI(isPaused) {
      if (isPaused) {
        btn.textContent = "▶ Resume";
        btn.className = "paused";
        statusEl.textContent = "🔴 Game is PAUSED";
      } else {
        btn.textContent = "⏸ Pause";
        btn.className = "running";
        statusEl.textContent = "🟢 Game is Running";
      }
      btn.style.display = "block";
    }

    OBR.onReady(async () => {
      console.log("items API:", Object.keys(OBR.scene.items)); // เพิ่มบรรทัดนี้
      const role = await OBR.player.getRole();

      if (role !== "GM") {
        statusEl.textContent = "❌ GM only";
        return;
      }

      const metadata = await OBR.room.getMetadata();
      let isPaused = metadata[METADATA_KEY] ?? false;
      updateUI(isPaused);

      OBR.room.onMetadataChange((meta) => {
        isPaused = meta[METADATA_KEY] ?? false;
        updateUI(isPaused);
      });

      btn.addEventListener("click", async () => {
        isPaused = !isPaused;
        await OBR.room.setMetadata({ [METADATA_KEY]: isPaused });

        const items = await OBR.scene.items.getItems();
        const targets = items.filter(i => i.layer === "CHARACTER");
        if (targets.length > 0) {
          await OBR.scene.items.updateItems(targets, (all) => {
            for (const item of all) {
              item.locked = isPaused;
            }
          });
        }

        OBR.notification.show(
          isPaused ? "⏸ Game Paused!" : "▶ Game Resumed!",
          isPaused ? "WARNING" : "SUCCESS"
        );
        updateUI(isPaused);
      });
    });
  </script>
</body>
</html>
