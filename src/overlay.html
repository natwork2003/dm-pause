<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: 'Georgia', serif;
      text-align: center;
      gap: 16px;
      overflow: hidden;
    }
    .icon {
      font-size: 4rem;
      animation: pulse 2s infinite;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 8px;
      text-transform: uppercase;
      text-shadow: 
        0 0 20px rgba(231, 76, 60, 1),
        0 0 40px rgba(231, 76, 60, 0.5);
    }
    p {
      font-size: 1rem;
      opacity: 0.6;
      letter-spacing: 2px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.95); }
    }
  </style>
</head>
<body>
  <div class="icon">⏸</div>
  <h1>Game Paused</h1>
  <p>Waiting for the DM...</p>
</body>
</html>
