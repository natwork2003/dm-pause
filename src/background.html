<!DOCTYPE html>
<html>
<body>
  <script type="module">
    import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@3.1.0/+esm";

    OBR.onReady(async () => {
      const role = await OBR.player.getRole();

      // สร้าง overlay element
      const overlay = document.createElement("div");
      overlay.style.cssText = `
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.75);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        color: white;
        font-family: sans-serif;
        pointer-events: none;
      `;
      overlay.innerHTML = `
        <div style="font-size: 3rem; font-weight: bold; letter-spacing: 4px;">⏸ GAME PAUSED</div>
        <div style="font-size: 1rem; margin-top: 12px; opacity: 0.7;">Waiting for the DM...</div>
      `;
      document.body.appendChild(overlay);

      function showOverlay(show) {
        overlay.style.display = show ? "flex" : "none";
      }

      // เช็คสถานะตอนโหลด
      const metadata = await OBR.room.getMetadata();
      const isPaused = metadata["com.natwork.dmpause/paused"] ?? false;
      if (role !== "GM") showOverlay(isPaused);

      // รับ broadcast จาก GM
      OBR.broadcast.onMessage("com.natwork.dmpause/notify", (event) => {
        const isPaused = event.data?.paused;
        OBR.notification.show(
          isPaused ? "⏸ Game Paused by DM!" : "▶ Game Resumed!",
          isPaused ? "WARNING" : "SUCCESS"
        );
        if (role !== "GM") showOverlay(isPaused);
      });
    });
  </script>
</body>
</html>
