<!DOCTYPE html>
<html>
<body>
  <script type="module">
    import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@3.1.0/+esm";

    const METADATA_KEY = "com.natwork.dmpause/paused";
    let isPaused = false;
    let itemSnapshot = {};

    OBR.onReady(async () => {
      const role = await OBR.player.getRole();

      // โหลดสถานะเริ่มต้น
      const metadata = await OBR.room.getMetadata();
      isPaused = metadata[METADATA_KEY] ?? false;

      // ติดตาม metadata
      OBR.room.onMetadataChange((meta) => {
        isPaused = meta[METADATA_KEY] ?? false;
        if (isPaused) takeSnapshot();
      });

      // เก็บ snapshot ตำแหน่งปัจจุบัน
      async function takeSnapshot() {
        const items = await OBR.scene.items.getItems();
        itemSnapshot = {};
        for (const item of items) {
          itemSnapshot[item.id] = {
            position: { ...item.position },
            rotation: item.rotation
          };
        }
      }

      // ถ้าเป็น player ให้ revert การขยับ
      if (role !== "GM") {
        if (isPaused) takeSnapshot();

        OBR.scene.items.onChange(async (items) => {
          if (!isPaused) return;

          const myId = await OBR.player.getId();
          const movedByMe = items.filter(
            i => i.lastModifiedUserId === myId && itemSnapshot[i.id]
          );

          if (movedByMe.length > 0) {
            await OBR.scene.items.updateItems(movedByMe, (all) => {
              for (const item of all) {
                if (itemSnapshot[item.id]) {
                  item.position = itemSnapshot[item.id].position;
                  item.rotation = itemSnapshot[item.id].rotation;
                }
              }
            });
          }
        });
      }

      // รับ broadcast แสดง notification
      OBR.broadcast.onMessage("com.natwork.dmpause/notify", (event) => {
        const paused = event.data?.paused;
        OBR.notification.show(
          paused ? "⏸ Game Paused by DM!" : "▶ Game Resumed!",
          paused ? "WARNING" : "SUCCESS"
        );
        if (paused) takeSnapshot();
      });
    });
  </script>
</body>
</html>
